name: Generate Pac-Man

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate pac-man animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Odd-Crafter
          outputs: |
            dist/pacman-contribution.svg?palette=github-dark&type=pacman&color_snake=#57A143&color_dots=#1f1f1f,#0d4a0d,#1a7a1a,#57A143,#97C459

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
